{% extends "base.html" %}
{% block title %} - Hardware{% endblock %}

{% block content %}
<div class="settings-page">
  <a href="{{ url_for('settings') }}" class="settings-back">&#8249; Settings</a>
  <h1>Hardware</h1>

  <div class="field">
    <label>Reboot</label>
    <p class="hint">Restart the Raspberry Pi. The web UI will be unavailable for ~30 seconds.</p>
    <form method="POST" action="/settings/reboot">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <button type="submit" class="save-btn reboot-btn"
              onclick="return confirm('Reboot the Raspberry Pi?')">Reboot Raspberry Pi</button>
    </form>
  </div>
</div>
{% endblock %}
