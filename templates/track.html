{% extends "base.html" %}
{% block title %} — {{ track.name }}{% endblock %}

{% block content %}
<div class="album-page">
  <div class="album-header">
    <img src="{{ track.artwork_url }}" alt="{{ track.album }}" class="album-art">
    <div class="album-meta">
      <h1>{{ track.name }}</h1>
      <p class="artist">{{ track.artist }}</p>
      <p class="track-subtitle">
        {% if track.album_id %}
          <a href="/album/{{ track.album_id }}">{{ track.album }}</a>
        {% else %}
          {{ track.album }}
        {% endif %}
      </p>
      <p class="tag-string">Tag: <code>apple:track:{{ track_id }}</code></p>

      <div class="action-btns">
        <button id="play-btn" class="play-btn" data-track-id="{{ track_id }}">
          ▶ Play Now
        </button>
        <button id="write-btn" class="write-btn" data-track-id="{{ track_id }}">
          Write to Tag
        </button>
      </div>
      <p id="action-status" class="write-status"></p>
      <div id="write-confirm" class="write-confirm" style="display:none">
        <span id="write-confirm-msg"></span>
        <button id="write-confirm-yes" class="write-confirm-yes">Overwrite</button>
        <button id="write-confirm-no" class="write-confirm-no">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  const status = document.getElementById('action-status');

  async function postAction(url, body, btn, busyText, doneText, successMsg) {
    btn.disabled = true;
    btn.textContent = busyText;
    status.textContent = '';
    status.className = 'write-status';
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!resp.ok) {
        btn.textContent = doneText;
        btn.disabled = false;
        status.textContent = data.error || 'Something went wrong.';
        status.className = 'write-status error';
        return;
      }
      btn.textContent = doneText;
      btn.disabled = false;
      status.textContent = successMsg(data);
      status.className = 'write-status success';
    } catch (e) {
      btn.textContent = doneText;
      btn.disabled = false;
      status.textContent = 'Error — check the console.';
      status.className = 'write-status error';
    }
  }

  document.getElementById('play-btn').addEventListener('click', function() {
    postAction('/play', {track_id: this.dataset.trackId}, this, 'Playing…', '▶ Play Now',
      () => { window.refreshNowPlaying && window.refreshNowPlaying(); return '✓ Playing on Sonos'; });
  });

  async function writeTag(body) {
    const btn = document.getElementById('write-btn');
    const confirmBox = document.getElementById('write-confirm');
    btn.disabled = true;
    btn.textContent = 'Writing…';
    status.textContent = '';
    status.className = 'write-status';
    confirmBox.style.display = 'none';
    try {
      const resp = await fetch('/write-tag', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      btn.textContent = 'Write to Tag';
      btn.disabled = false;
      if (!resp.ok) {
        status.textContent = data.error || 'Something went wrong.';
        status.className = 'write-status error';
        return;
      }
      if (data.status === 'confirm') {
        document.getElementById('write-confirm-msg').textContent =
          'Tag already has: ' + data.existing_display;
        confirmBox.style.display = 'flex';
        return;
      }
      status.textContent = '✓ Written: ' + data.written;
      status.className = 'write-status success';
    } catch (e) {
      console.error('Write tag error:', e);
      btn.textContent = 'Write to Tag';
      btn.disabled = false;
      status.textContent = 'Network error — is the server running?';
      status.className = 'write-status error';
    }
  }

  document.getElementById('write-btn').addEventListener('click', function() {
    writeTag({track_id: this.dataset.trackId});
  });

  document.getElementById('write-confirm-yes').addEventListener('click', function() {
    document.getElementById('write-confirm').style.display = 'none';
    writeTag({track_id: document.getElementById('write-btn').dataset.trackId, force: true});
  });

  document.getElementById('write-confirm-no').addEventListener('click', function() {
    document.getElementById('write-confirm').style.display = 'none';
  });
</script>
{% endblock %}
