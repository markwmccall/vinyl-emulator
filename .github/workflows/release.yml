name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0) — must match VERSION file on main"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION file matches input
        run: |
          FILE_VERSION="$(cat VERSION)"
          if [ "$FILE_VERSION" != "${{ github.event.inputs.version }}" ]; then
            echo "Error: VERSION file contains '$FILE_VERSION' but input is '${{ github.event.inputs.version }}'"
            echo "Update and commit the VERSION file first, then run this workflow."
            exit 1
          fi
          echo "VERSION verified: $FILE_VERSION"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
          gh release create "v${{ github.event.inputs.version }}" \
            --title "Vinyl Emulator v${{ github.event.inputs.version }}" \
            --generate-notes
